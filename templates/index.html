<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarisk — Vérifier un artisan avant de lui faire confiance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-xl px-4">

        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900">Clarisk</h1>
            <p class="text-gray-500 mt-2">Vérifier un artisan avant de lui faire confiance</p>
        </div>

        <form action="/resultats" method="get" class="flex gap-2">
            <input
                type="text"
                name="q"
                placeholder="Nom d'entreprise, SIRET ou SIREN…"
                class="flex-1 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                autofocus
            />
            <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg transition"
            >
                Analyser
            </button>
        </form>

        {% if erreur %}
        <p class="mt-4 text-red-500 text-sm text-center">{{ erreur }}</p>
        {% endif %}

        <p class="text-center text-xs text-gray-400 mt-8 space-x-3">
    <a href="/mentions-legales" class="hover:underline">Mentions légales</a>
    <span>·</span>
    <a href="/cgu" class="hover:underline">CGU</a>
    <span>·</span>
    <a href="/confidentialite" class="hover:underline">Confidentialité</a>
</p>

    </div>

</body>
</html>
