<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarisk — Connexion dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-4">
        <div class="text-center mb-8">
            <a href="/" class="text-blue-600 font-bold text-xl">Clarisk</a>
            <p class="text-gray-400 text-sm mt-1">Accès dashboard analytics</p>
        </div>

        <form action="/dashboard/login" method="post" class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Mot de passe</label>
                <input
                    type="password"
                    name="password"
                    autofocus
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
            </div>
            {% if erreur %}
            <p class="text-sm text-red-500">{{ erreur }}</p>
            {% endif %}
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
                Accéder
            </button>
        </form>
    </div>
</body>
</html>
